name: Deploy to ECS

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 609490184594.dkr.ecr.us-east-1.amazonaws.com
  FRONTEND_IMAGE: tienda-perritos-frontend
  BACKEND_IMAGE: tienda-perritos-backend
  ECS_CLUSTER: tienda-perritos
  FRONTEND_SERVICE: frontend-service
  BACKEND_SERVICE: backend-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login a Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build y Push Frontend
      run: |
        docker build -t $ECR_REGISTRY/$FRONTEND_IMAGE:latest ./frontend
        docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest

    - name: Build y Push Backend
      run: |
        docker build -t $ECR_REGISTRY/$BACKEND_IMAGE:latest ./backend
        docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest

    - name: Deploy Frontend a ECS
      run: |
        aws ecs update-service --cluster $ECS_CLUSTER --service $FRONTEND_SERVICE --force-new-deployment --region $AWS_REGION

    - name: Deploy Backend a ECS
      run: |
        aws ecs update-service --cluster $ECS_CLUSTER --service $BACKEND_SERVICE --force-new-deployment --region $AWS_REGION

    - name: Verificar deployment
      run: |
        aws ecs wait services-stable --cluster $ECS_CLUSTER --services $FRONTEND_SERVICE $BACKEND_SERVICE --region $AWS_REGION
        echo "Deploy exitoso"